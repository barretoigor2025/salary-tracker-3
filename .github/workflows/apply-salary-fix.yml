name: Apply Salary Fix

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - .github/workflows/apply-salary-fix.yml

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Patch salary calculation
        run: |
          python3 - <<'PY'
          from pathlib import Path
          p = Path('src/utils/finance.js')
          s = p.read_text()
          old = '  const grossSalary = calcs.reduce((s, c) => s + c.grossPay, 0);\n'
          new = '''  const totalHours = calcs.reduce((s, c) => s + c.totalHours, 0);\n  const overtimeHours = calcs.reduce((s, c) => s + c.overtimeHours, 0);\n  const rate = settings.hourlyRate || 0;\n  // calcDay stores overtimePay as premium only. Add the base wage for overtime hours here.\n  const grossSalary = calcs.reduce((s, c) => s + c.grossPay, 0) + (overtimeHours * rate);\n'''
          if old in s:
              s = s.replace(old, new)
          s = s.replace('    totalHours: calcs.reduce((s, c) => s + c.totalHours, 0),\n    overtimeHours: calcs.reduce((s, c) => s + c.overtimeHours, 0),', '    totalHours,\n    overtimeHours,')
          p.write_text(s)
          PY
      - name: Commit patch
        run: |
          git config user.name github-actions[bot]
          git config user.email github-actions[bot]@users.noreply.github.com
          git add src/utils/finance.js
          if git diff --cached --quiet; then
            echo "No changes needed"
          else
            git commit -m "Fix Controle salary overtime base pay"
            git push
          fi
